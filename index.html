<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Directorio web de recursos de Valladolid." />
    <meta name="theme-color" content="#6f59a8" />
    <title>Directorio | Aldea Pucela</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Modo oscuro script -->
    <script>
      (function () {
        const key = 'aldeapucela_theme';
        try {
          const saved = window.localStorage.getItem(key);
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = saved === 'dark' || saved === 'light' ? saved : (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      }());
    </script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="min-h-screen flex flex-col">
    
    <!-- Topbar -->
    <header class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a class="flex items-center gap-3 hover:opacity-90 transition-opacity" href="/">
          <img src="https://aldeapucela.org/img/logo-web.jpg" alt="Logo Aldea Pucela" class="h-10 w-10 rounded-full object-cover border-2 border-primary" />
          <div class="flex flex-col leading-tight">
            <span class="text-[10px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase">ALDEA PUCELA</span>
            <span class="text-lg font-bold text-slate-900 dark:text-white">Directorio</span>
          </div>
        </a>
        
        <div class="flex items-center gap-4">
          <button id="theme-toggle" type="button" class="text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary-dark transition-colors" aria-label="Cambiar tema">
            <i class="fa-regular fa-moon text-xl" id="theme-icon"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      
      <!-- Cabecera de Página -->
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Recursos de Valladolid</h1>
        <p class="text-slate-600 dark:text-slate-400">Encuentra webs, sedes electrónicas, asociaciones y más recursos de la ciudad de Valladolid.</p>
      </div>

      <!-- Barra de Filtros -->
      <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-4 mb-6 flex flex-col sm:flex-row gap-4">
        
        <!-- Buscador -->
        <div class="flex-grow relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
          </div>
          <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" placeholder="Buscar por nombre o descripción...">
        </div>
        
        <!-- Categoría -->
        <div class="sm:w-64">
          <select id="categorySelect" class="block w-full pl-3 pr-10 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow">
            <option value="all">Todas las categorías</option>
            <!-- Opciones dinámicas -->
          </select>
        </div>
        
        <!-- Filtro Oficial -->
        <div class="flex items-center">
          <label class="flex items-center cursor-pointer gap-2">
            <div class="relative">
              <input type="checkbox" id="oficialToggle" class="sr-only">
              <div class="block bg-slate-300 dark:bg-slate-600 w-10 h-6 rounded-full transition-colors toggle-bg"></div>
              <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
            </div>
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Solo Oficiales <i class="fa-solid fa-circle-check text-blue-500 ml-1"></i></span>
          </label>
        </div>
      </div>

      <!-- Nube de Etiquetas -->
      <div class="mb-8">
        <h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">Etiquetas Populares</h3>
        <div id="tagCloud" class="flex flex-wrap gap-2">
          <!-- Etiquetas dinámicas -->
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading" class="flex justify-center items-center py-20">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary"></i>
      </div>

      <!-- Grid de Resultados -->
      <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        <!-- Fichas dinámicas -->
      </div>
      
      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-16">
        <i class="fa-solid fa-folder-open text-6xl text-slate-300 dark:text-slate-600 mb-4"></i>
        <h3 class="text-lg font-medium text-slate-900 dark:text-white">No se encontraron resultados</h3>
        <p class="text-slate-500 dark:text-slate-400">Prueba a cambiar los filtros o el término de búsqueda.</p>
      </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8 mt-auto">
      <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 dark:text-slate-400 text-sm">
        <p>&copy; 2026 Aldea Pucela. Proyecto Open Source.</p>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
    
    <style>
      /* Toggle switch custom styles */
      input:checked ~ .dot {
        transform: translateX(100%);
      }
      input:checked ~ .toggle-bg {
        background-color: var(--color-primary);
      }
    </style>
  </body>
</html>
